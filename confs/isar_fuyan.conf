general {
    base_exp_dir = ./exp/CASE_NAME             # 实验输出目录；CASE_NAME 会替换为具体目标名
    recording = [                              # 训练开始时备份的代码目录
        ./,
        ./models
    ]
}

dataset {
    data_dir = ./public_data/CASE_NAME/        # 数据根目录；CASE_NAME 会替换为具体目标名
    image_dir = image                          # ISAR 图像子目录
    meta_name = radar_meta.json                # 每帧雷达元数据文件名
    bound_radius = 1.01                        # mesh 提取包围盒半径；训练采样空间由 renderer.bound 控制
}

train {
    seed = 20260708                            # 随机种子；固定初始化和训练帧顺序
    learning_rate = 5e-4                       # Adam 初始学习率；对齐环境/nerf_train.py 的实际训练 lr
    learning_rate_alpha = 0.05                 # 余弦学习率衰减的最低比例
    end_iter = 1000                            # 总训练迭代数；对齐环境/nerf_train.py 的 epoch 数
    warm_up_end = 20                           # 学习率 warm-up 结束迭代

    anneal_end = 160                           # NeuS cos_anneal_ratio 从 0 增长到 1 的迭代次数

    save_freq = 100                            # checkpoint 保存频率
    val_freq = 50                              # 验证图像保存频率
    val_mesh_freq = 100                        # mesh 提取频率；短跑不想提 mesh 时可设为 1000000
    val_sdf_freq = 50                          # z=0 SDF/密度剖面保存频率；设为 0 可关闭

    metrics_plot_freq = 20                     # 训练曲线图保存频率；设为 0 可关闭
    report_freq = 50                           # 终端 loss 打印频率
    n_height_schedule = [                      # 训练时第三维高度采样调度；iter 到达后切换到 value
        { iter = 0, value = 64 },
        { iter = 201, value = 64 },
        { iter = 401, value = 64 }
    ]

    image_weight = 1.0                         # 整图图像损失权重
    image_loss_type = "mse"                    # l1 | mse/l2 | huber/smooth_l1 | charbonnier
    huber_beta = 0.1                           # image_loss_type=huber 时的 SmoothL1 beta
    charbonnier_eps = 1e-3                     # image_loss_type=charbonnier 时的 epsilon
    igr_weight = 0.1                           # Eikonal / IGR 正则项权重；NeRF 模式下不使用
    intensity_freeze_end = 200                 # 兼容保留；当前 NeRF 不再使用旧 intensity 分支
}

validate {
    view_ids = "0"                             # validate_views 默认验证并拼接的视角；也可设为 "all" 或 "0,6,12"
    export_init_image = true                   # 从头训练时是否先保存 iter_000000 验证图；视角由 view_ids 控制
    export_init_sdf = true                     # 从头训练时是否先保存 sdf_z0_000000.png 或 density_z0_000000.png
    export_init_mesh = true                    # 从头训练时是否先导出 mesh_000000.ply；false 可跳过初始 mesh

    export_final_checkpoint = false            # 训练结束或 Ctrl+C 打断时是否保存最终 checkpoint
    export_final_image = true                  # 训练结束或 Ctrl+C 打断时是否保存最终验证图
    final_view_ids = "all"                     # 最终验证图视角；all 表示保存全部帧拼接图
    export_final_sdf = false                   # 训练结束或 Ctrl+C 打断时是否保存最终 z=0 SDF/密度剖面
    export_final_mesh = false                  # 训练结束或 Ctrl+C 打断时是否保存最终 mesh

    # export_final_checkpoint = true           # 如需结束时强制保存 checkpoint，可打开
    # export_final_image = true                # 如需结束时保存验证图，可打开
    # final_view_ids = "all"                   # 最终验证图视角
    # export_final_sdf = true                  # 如需结束时保存剖面，可打开
    # export_final_mesh = true                 # 如需结束时保存 mesh，可打开

    mesh_resolution = 128                      # validate_mesh 的 marching cubes 网格分辨率；64 快，128/256 更细但更慢
    nerf_density_threshold = 0.03               # NeRF 相对阈值比例；value=min+(max-min)*ratio
    n_height = 64                              # validate_image/views/mesh 时使用的高度采样数
}

model {
    type = "nerf"                              # neus | nerf
    sdf_network {
        d_out = 257                            # 输出维度；第 1 维是 SDF，后 256 维为保留特征
        d_in = 3                               # 输入 3D 坐标维度
        d_hidden = 256                         # MLP 隐藏层宽度
        n_layers = 8                           # MLP 层数
        skip_in = [4]                          # skip connection 所在层
        multires = 6                           # 位置编码频带数

        bias = 0.5                             # 几何初始化偏置
        scale = 1.0                            # SDF 网络内部坐标缩放
        geometric_init = True                  # 是否使用几何初始化
        weight_norm = True                     # 是否使用 weight normalization

        init_ellipsoid_scale = [1.0, 0.5, 0.5] # 旧版 MLP 几何初始化缩放；mlp 模式下生效
        sdf_mode = "ellipsoid_residual"        # mlp=原始网络；ellipsoid_residual=解析椭球 SDF + MLP 残差
        ellipsoid_radius = [0.8, 0.4, 0.4]     # 解析椭球半轴，归一化坐标；避免贴住 renderer.bound=1.0
        ellipsoid_center = [0.0, 0.0, 0.0]     # 解析椭球中心，归一化坐标
        learn_ellipsoid = false                # true 时半轴和中心也参与优化；先固定更稳
        residual_scale = 0.1                   # 残差幅度系数，防止早期随机残差破坏椭球先验
        residual_init_weight = 0.0             # 初始残差权重；0 表示初始 SDF 严格等于解析椭球
    }
    variance_network {
        init_val = 0.5                         # NeuS 常用初始值；对应 variance 参数的初始值
    }
    nerf_network {
        D = 8
        W = 256
        d_in = 3
        multires = 10                          # xyz 编码频带数；匹配旧版 sin(pi * xyz * 2^k), k=0..9
        multires_view = 4                      # LOS 编码频带数；匹配旧版 sin(LOS * 2^k), k=0..3
        skips = [4]
        use_viewdirs = true
        density_mode = "learned_alpha_sigma"   # NeRF 输出 alpha + sigma；不使用椭球先验
    }
    isar_renderer {
        bound = 1.0                            # 归一化训练空间范围，采样空间约为 [-1, 1]^3
        coord_scale = 30.0                     # 归一化坐标到物理米制坐标的比例；[-1,1] 对应 [-30m,30m]
        n_azimuth = 64                         # 方位向采样数；建议等于图像宽度，避免横向分辨率下降
        n_range = 64                           # 距离向采样数；建议等于图像高度，避免距离向条纹
        n_importance = 12                      # NeuS fine 采样点数；NeRF 模式下不使用 NeuS up-sampling
        up_sample_steps = 2                    # fine 采样轮数；n_importance=0 时不生效
        n_height = 64                          # 第三维高度采样数；主要用于调速
    }
}
