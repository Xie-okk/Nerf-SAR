general {
    base_exp_dir = ./exp/CASE_NAME        # 实验输出目录；CASE_NAME 会替换为具体目标名
    recording = [                              # 训练开始时备份的代码目录
        ./,
        ./models
    ]
}

dataset {
    data_dir = ./public_data/CASE_NAME/        # 数据根目录；CASE_NAME 会替换为具体目标名
    image_dir = image                          # ISAR 图像子目录
    meta_name = radar_meta.json                # 每帧雷达元数据文件名
    bound_radius = 1.01                        # mesh 提取包围盒半径；训练采样空间由 renderer.bound 控制
}

train {
    seed = 20260708                           # 随机种子；固定 SDF 初始化和训练帧顺序
    learning_rate = 5e-5                       # Adam 初始学习率
    learning_rate_alpha = 0.05                 # 余弦学习率余弦衰减的最低比例
    end_iter = 1000                            # 总训练迭代数；当前是短跑测试值
    warm_up_end = 20                           # 学习率 warm-up 结束迭代

    anneal_end = 160                           # NeuS cos_anneal_ratio 从 0 增长到 1 的迭代次数-训练策略


    save_freq = 200                          # checkpoint 保存频率
    val_freq = 20                              # 验证图像保存频率
    val_mesh_freq = 100                        # mesh 提取频率；短跑不想提 mesh 时可设为 1000000
    val_sdf_freq = 20                         # z=0 SDF 剖面保存频率；设为 0 可关闭

    metrics_plot_freq = 20                    # 训练曲线图保存频率；设为 0 可关闭
    report_freq = 20                           # 终端 loss 打印频率
    n_height_schedule = [                    # 训练时第三维高度采样调度；iter 到达后切换 value
        { iter = 0, value = 64 },
        { iter = 201, value = 64 },
        { iter = 401, value = 64 }
    ]
    
    image_weight = 1.0                         # 整图图像损失权重
    image_loss_type = "l1"                     # l1 | huber/smooth_l1 | charbonnier
    huber_beta = 0.1                           # image_loss_type=huber 时的 SmoothL1 beta
    charbonnier_eps = 1e-3                     # image_loss_type=charbonnier 时的 epsilon
    igr_weight = 0.1                           # Eikonal / IGR 正则项权重
}

validate {
    view_ids = "0"                             # validate_views 默认验证并拼接的视角；也可设为 "all"、"0"
    export_init_image = true                   # 从头训练时是否先保存 iter_000000 验证图；视角由 view_ids 控制
    export_init_sdf = true                    # 从头训练时是否先保存 sdf_z0_000000.png
    export_init_mesh = true                    # 从头训练时是否先导出 mesh_000000.ply；false 可跳过初始 mesh
    
    export_final_checkpoint = false             # 训练结束或 Ctrl+C 打断时保存最后 checkpoint
    export_final_image = false                  # 训练结束或 Ctrl+C 打断时保存最后验证图
    final_view_ids = "all"                     # 最后验证图视角；all 表示保存全部帧拼接图
    export_final_sdf = false                    # 训练结束或 Ctrl+C 打断时保存最后 z=0 SDF 剖面
    export_final_mesh = false                   # 训练结束或 Ctrl+C 打断时保存最后 mesh

    # export_final_checkpoint = true             # 训练结束或 Ctrl+C 打断时保存最后 checkpoint
    # export_final_image = true                  # 训练结束或 Ctrl+C 打断时保存最后验证图
    # final_view_ids = "all"                     # 最后验证图视角；all 表示保存全部帧拼接图
    # export_final_sdf = true                    # 训练结束或 Ctrl+C 打断时保存最后 z=0 SDF 剖面
    # export_final_mesh = true                   # 训练结束或 Ctrl+C 打断时保存最后 mesh

    mesh_resolution = 64                       # validate_mesh 的 marching cubes 网格分辨率；64 快，128/256 更细但更慢
    n_height = 64                              # 单独 validate_image/views/mesh 时使用的高度采样数
}

model {
    sdf_network {
        d_out = 257                            # 输出维度；第 1 维是 SDF，后 256 维为保留特征
        d_in = 3                               # 输入 3D 坐标维度
        d_hidden = 256                         # MLP 隐藏层宽度
        n_layers = 8                           # MLP 层数
        skip_in = [4]                          # skip connection 所在层
        multires = 6                           # 位置编码频带数

        bias = 0.5                             # 几何初始化偏置
        scale = 1.0                            # SDF 网络内部坐标缩放
        geometric_init = True                  # 是否使用几何初始化
        weight_norm = True                     # 是否使用 weight normalization

        init_ellipsoid_scale = [1.0, 0.5, 0.5]  # 旧版 MLP 几何初始化缩放；mlp 模式下生效
        sdf_mode = "ellipsoid_residual"        # mlp=原始网络；ellipsoid_residual=解析椭球SDF+MLP残差
        ellipsoid_radius = [0.8, 0.4, 0.4]      # 解析椭球半轴，归一化坐标；避免贴住 renderer.bound=1.0
        ellipsoid_center = [0.0, 0.0, 0.0]      # 解析椭球中心，归一化坐标
        learn_ellipsoid = false                # true 时半轴和中心也参与优化；先固定更稳
        residual_scale = 0.1                   # 残差幅度系数，防止早期随机残差破坏椭球先验
        residual_init_weight = 0.0             # 初始残差权重；0 表示初始 SDF 严格等于解析椭球
    }
    variance_network {
        init_val = 0.5                        # NeuS 常用初始值；对应 variance 参数的初始值
    }
    isar_renderer {
        bound = 1.0                            # 归一化训练空间范围，采样空间为 [-1, 1]^3
        coord_scale = 30.0                     # 归一化坐标到物理米制坐标的比例；[-1,1] 对应 [-30m,30m]
        n_azimuth = 64                         # 方位向采样数；建议等于图像宽度，避免横向分辨率下降
        n_range = 24                           # 距离向采样数；建议等于图像高度，避免横向条纹
        n_importance = 12                       # 暂时关闭 NeuS up-sampling，先避免初始化/早期训练的采样伪影
        up_sample_steps = 2                    # fine 采样轮数；n_importance=0 时不生效
        n_height = 64                          # 第三维高度采样数；主要调速参数
    }
}
